<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>SK Air Monitoring</title>
  <link rel="icon" href="data:,">

  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
    }

    #map {
      position: absolute;
      top: 0;
      left: 320px;
      right: 0;
      bottom: 0;
    }

    #panel {
      position: absolute;
      top: 0;
      left: 0;
      width: 320px;
      height: 100%;
      overflow-y: auto;
      background: #fff;
      border-right: 1px solid #ccc;
      z-index: 1000;
      padding: 12px;
      box-sizing: border-box;
    }

    #panel h3 {
      margin: 0 0 10px 0;
      font-size: 18px;
    }

    #panel input {
      width: 100%;
      padding: 8px;
      margin-bottom: 8px;
      box-sizing: border-box;
    }

    #panel button {
      width: 100%;
      padding: 8px;
      margin-bottom: 12px;
      cursor: pointer;
    }

    .panel-section {
      margin-bottom: 14px;
      font-size: 13px;
      line-height: 1.35;
    }

    .aqhi-marker div {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 2px solid #333;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 16px;
      color: black;
      text-shadow:
        -1px -1px 0 #fff,
         1px -1px 0 #fff,
        -1px  1px 0 #fff,
         1px  1px 0 #fff;
    }
  </style>
</head>

<body>

  <div id="panel">
    <h3>SK Air Monitoring</h3>

    <input id="addressInput" type="text" placeholder="Enter address or place">
    <button onclick="lookupAddress()">Go to address</button>

    <div id="panel-location" class="panel-section"></div>
    <div id="panel-weather" class="panel-section"></div>
    <div id="mini-weather" class="panel-section"></div>
    <div id="mini-weather-forecast" class="panel-section"></div>
    <div id="panel-forecast" class="panel-section"></div>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="web/map.js"></script>
</body>
</html>
