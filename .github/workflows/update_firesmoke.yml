name: Update FireSmoke

permissions:
  contents: write

on:
  schedule:
    - cron: '0 */3 * * *'   # every 3 hours
  workflow_dispatch:

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - run: python scripts/fetch_firesmoke.py

      - uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: Update FireSmoke forecast
