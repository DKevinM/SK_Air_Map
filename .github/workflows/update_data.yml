name: Build Air Data

on:
  schedule:
    - cron: '*/20 * * * *'   # every 20 minutes
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas numpy requests

      # 🔹 STEP 1: MAP DATA (always runs)
      - name: Build current map
        run: python scripts/build_current_map.py

      # 🔹 STEP 2: FORECAST INPUT (allowed to fail without breaking pipeline)
      - name: Build forecast input
        run: python scripts/build_forecast_input.py
        continue-on-error: true

      # 🔹 STEP 3: Commit outputs
      - name: Commit & push outputs
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/
          git commit -m "update air data $(date -u)" || echo "No changes"
          git push
