name: Update SK Air Data

permissions:
  contents: write

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages
        run: |
          pip install \
            pandas \
            geopandas \
            scipy \
            numpy \
            shapely \
            scikit-learn

      - name: Run script
        run: |
          python scripts/build_current_geojson.py

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: Update SK AQHI data
