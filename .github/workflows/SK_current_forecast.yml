name: Update SK Current + Forecast

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests joblib

      - name: Build current AQHI and latest observations
        run: python scripts/build_current_geojson.py

      - name: Run forecast
        run: python scripts/run_forecast.py

      - name: Commit and push outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/sk_aqhi_current.geojson data/latest_observations.csv data/forecast.json
          git diff --cached --quiet || git commit -m "Update SK current AQHI and forecast"
          git push
