name: Update SK PurpleAir Sensor List

on:
  schedule:
    - cron: '0 6 * * *'  # Run every day at 6 AM UTC
  workflow_dispatch:     # Allow manual run via GitHub Actions UI

jobs:
  update-sensors:
    runs-on: ubuntu-latest

    env:
        PURPLEAIR_API_KEY: ${{ secrets.PURPLEAIR_API_KEY }}
        SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas geopandas shapely requests supabase

      - name: Run PurpleAir region script
        run: python PA_SK_pull.py

      - name: Commit and push CSV
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add dataSK/SK_PA_sensors.csv
          git diff --cached --quiet || git commit -m "Daily update: SK_PA_sensors.csv"
          git pull --rebase origin main
          git push
